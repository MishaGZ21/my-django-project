{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="columns is-centered">
  <div class="column is-one-third">
    <h1 class="title">Вход</h1>
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label class="label">Логин</label>
        <div class="control"><input class="input" type="text" name="username" required></div>
      </div>
      <div class="field">
        <label class="label">Пароль</label>
        <div class="control"><input class="input" type="password" name="password" required></div>
      </div>
      <div class="field">
        <button class="button is-primary" type="submit">Войти</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
